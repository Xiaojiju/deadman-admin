spring:
  application:
    name: deadman-admin
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:mysql://${DB_HOST:47.108.226.11}:${DB_PORT:3306}/${DB_NAME:deadman_admin}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:mtfm123456@2026}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:47.108.226.11}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:mtfm123456@2026}
  cache:
    type: redis
    redis:
      time-to-live: 30m
      key-prefix: "deadman:cache:"

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

deadman:
  jwt:
    secret: ${DEADMAN_JWT_SECRET:36796c58bf17e410ea17ea4460d3a26071cb1940991a12741d790ce83368d44e}
    expiration-ms: ${DEADMAN_JWT_EXPIRATION_MS:86400000}
  security:
    multi-session-enabled: ${DEADMAN_MULTI_SESSION_ENABLED:true}
  user:
    user-code-prefix: ${DEADMAN_USER_CODE_PREFIX:DM}
  bootstrap:
    admin-enabled: ${DEADMAN_BOOTSTRAP_ADMIN_ENABLED:true}
    super-admin-username: ${DEADMAN_SUPER_ADMIN_USERNAME:admin}
    super-admin-password: ${DEADMAN_SUPER_ADMIN_PASSWORD:admin123456}
    super-admin-nickname: ${DEADMAN_SUPER_ADMIN_NICKNAME:系统管理员}
  cache:
    user-profile-ttl: ${DEADMAN_CACHE_USER_PROFILE_TTL:30m}
  plugin:
    websocket:
      enabled: ${DEADMAN_PLUGIN_WEBSOCKET_ENABLED:true}
      endpoint-path: /ws
      dispatch:
        max-retry: 3
        retry-interval: 30s
        batch-size: 50
    wechat-miniprogram:
      enabled: ${DEADMAN_PLUGIN_WECHAT_MINIPROGRAM_ENABLED:true}
      app-id: ${DEADMAN_WECHAT_MINIPROGRAM_APP_ID:}
      app-secret: ${DEADMAN_WECHAT_MINIPROGRAM_APP_SECRET:}
    excel:
      enabled: ${DEADMAN_PLUGIN_EXCEL_ENABLED:true}
    file:
      enabled: ${DEADMAN_PLUGIN_FILE_ENABLED:true}
      default-provider: local
      max-file-size: ${DEADMAN_PLUGIN_FILE_MAX_SIZE:10MB}
    storage-local:
      enabled: ${DEADMAN_PLUGIN_STORAGE_LOCAL_ENABLED:true}
      base-path: ${FILE_STORAGE_PATH:./data/files}
      public-url-prefix: /files
  component:
    client:
      enabled: ${DEADMAN_COMPONENT_CLIENT_ENABLED:true}
      jwt:
        secret: ${DEADMAN_CLIENT_JWT_SECRET:8f3c2a1b9e7d6c5a4b3f2e1d0c9b8a7f6e5d4c3b2a1f0e9d8c7b6a5f4e3d2c1b}
        expiration-ms: ${DEADMAN_CLIENT_JWT_EXPIRATION_MS:604800000}
      user:
        user-code-prefix: ${DEADMAN_CLIENT_USER_CODE_PREFIX:CL}
      security:
        multi-session-enabled: ${DEADMAN_CLIENT_MULTI_SESSION_ENABLED:true}
