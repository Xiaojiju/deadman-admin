# com.mtfm.deadman.system.controller.RoleController
openapi: 3.0.3
info:
  title: RoleController
  version: 0.0.1-SNAPSHOT
  description: RBAC 角色与权限、用户角色分配

servers:
  - url: http://localhost:8080
    description: 本地 deadman-app

paths:
  /api/roles:
    get:
      summary: 角色列表
      description: 需要权限码 `role:list:read`
      operationId: listRoles
      tags: [角色]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultRoleSummaryList'
        '401':
          $ref: '../_shared/components.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../_shared/components.yaml#/components/responses/Forbidden'
    post:
      summary: 创建角色
      description: 需要权限码 `role:create`
      operationId: createRole
      tags: [角色]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoleRequest'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultRoleDetailVO'
        '401':
          $ref: '../_shared/components.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../_shared/components.yaml#/components/responses/Forbidden'

  /api/roles/{roleId}:
    parameters:
      - $ref: '../_shared/components.yaml#/components/parameters/RoleId'
    get:
      summary: 角色详情
      description: 需要权限码 `role:list:read`
      operationId: getRoleDetail
      tags: [角色]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultRoleDetailVO'
        '401':
          $ref: '../_shared/components.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../_shared/components.yaml#/components/responses/Forbidden'
    put:
      summary: 更新角色
      description: 需要权限码 `role:update`。不可修改 roleCode。
      operationId: updateRole
      tags: [角色]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoleRequest'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultRoleDetailVO'
        '401':
          $ref: '../_shared/components.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../_shared/components.yaml#/components/responses/Forbidden'
    delete:
      summary: 删除角色
      description: 需要权限码 `role:delete`。系统内置角色（如 SUPER_ADMIN）不可删除。
      operationId: deleteRole
      tags: [角色]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVoid'
        '401':
          $ref: '../_shared/components.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../_shared/components.yaml#/components/responses/Forbidden'

  /api/roles/{roleId}/permissions:
    parameters:
      - $ref: '../_shared/components.yaml#/components/parameters/RoleId'
    put:
      summary: 分配角色权限
      description: 需要权限码 `role:permission:assign`。覆盖式绑定权限码。
      operationId: assignRolePermissions
      tags: [角色]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignRolePermissionsRequest'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultRoleDetailVO'
        '401':
          $ref: '../_shared/components.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../_shared/components.yaml#/components/responses/Forbidden'

  /api/roles/users/{userId}:
    parameters:
      - $ref: '../_shared/components.yaml#/components/parameters/UserId'
    put:
      summary: 分配用户角色
      description: 需要权限码 `role:user:assign`。覆盖式绑定角色 ID 列表。
      operationId: assignUserRoles
      tags: [角色]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignUserRolesRequest'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVoid'
        '401':
          $ref: '../_shared/components.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../_shared/components.yaml#/components/responses/Forbidden'

components:
  securitySchemes:
    BearerAuth:
      $ref: '../_shared/components.yaml#/components/securitySchemes/BearerAuth'

  schemas:
    RoleSummaryVO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        roleCode:
          type: string
        roleName:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: integer
        systemBuiltin:
          type: boolean

    RoleDetailVO:
      allOf:
        - $ref: '#/components/schemas/RoleSummaryVO'
        - type: object
          properties:
            permissionCodes:
              type: array
              items:
                type: string

    CreateRoleRequest:
      type: object
      required: [roleCode, roleName]
      properties:
        roleCode:
          type: string
          pattern: '^[A-Z][A-Z0-9_]{1,63}$'
        roleName:
          type: string
          maxLength: 64
        description:
          type: string
          maxLength: 256
        permissionCodes:
          type: array
          items:
            type: string

    UpdateRoleRequest:
      type: object
      properties:
        roleName:
          type: string
          maxLength: 64
        description:
          type: string
          maxLength: 256
        status:
          type: integer

    AssignRolePermissionsRequest:
      type: object
      required: [permissionCodes]
      properties:
        permissionCodes:
          type: array
          items:
            type: string

    AssignUserRolesRequest:
      type: object
      required: [roleIds]
      properties:
        roleIds:
          type: array
          items:
            type: integer
            format: int64

    ResultRoleDetailVO:
      allOf:
        - $ref: '../_shared/components.yaml#/components/schemas/ResultBase'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/RoleDetailVO'

    ResultRoleSummaryList:
      allOf:
        - $ref: '../_shared/components.yaml#/components/schemas/ResultBase'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/RoleSummaryVO'

    ResultVoid:
      allOf:
        - $ref: '../_shared/components.yaml#/components/schemas/ResultBase'
        - type: object
          properties:
            data:
              nullable: true
