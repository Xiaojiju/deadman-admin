# com.mtfm.deadman.notification.controller.NotificationSendController
openapi: 3.0.3
info:
  title: NotificationSendController
  version: 0.0.1-SNAPSHOT
  description: |
    站内信发送与管理端查询。
    发送成功后会持久化到 `sys_notification` / `sys_notification_recipient`，
    并通过 WebSocket 管道 `inbox`（`ws://{host}/ws/inbox?token={jwt}`）向在线用户推送。

servers:
  - url: http://localhost:8080
    description: 本地 deadman-app

paths:
  /api/notifications/send:
    post:
      summary: 发送站内信
      description: |
        需要权限码 `notification:send`。
        支持按用户、部门、职位或全体发送；服务端解析为活跃用户后写入收件箱并推送 WebSocket。

        **targetType 与参数对应关系：**
        - `1` 定向用户：必填 `userIds`
        - `2` 部门：必填 `departmentIds`（取部门下活跃用户）
        - `3` 职位：必填 `positionIds`（取绑定该职位的活跃用户）
        - `4` 全体：无需额外 ID 列表
      operationId: sendNotification
      tags: [站内信]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendNotificationRequest'
            examples:
              targetUser:
                summary: 定向用户
                value:
                  title: 系统公告
                  content: 欢迎使用站内信
                  targetType: 1
                  userIds: [1001, 1002]
              targetDepartment:
                summary: 按部门
                value:
                  title: 部门通知
                  content: 请查收
                  targetType: 2
                  departmentIds: [2001]
              targetPosition:
                summary: 按职位
                value:
                  title: 职位通知
                  content: 请查收
                  targetType: 3
                  positionIds: [3001]
              targetAll:
                summary: 全体用户
                value:
                  title: 全员通知
                  content: 系统维护通知
                  targetType: 4
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultNotificationSendResultVO'
        '401':
          $ref: '../_shared/components.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../_shared/components.yaml#/components/responses/Forbidden'

  /api/notifications/sent:
    get:
      summary: 已发送站内信分页
      description: |
        需要权限码 `notification:sent:read`。
        按发送时间倒序；支持标题关键词模糊查询。
      operationId: pageSentNotifications
      tags: [站内信]
      security:
        - BearerAuth: []
      parameters:
        - name: current
          in: query
          schema:
            type: integer
            format: int64
            default: 1
        - name: size
          in: query
          schema:
            type: integer
            format: int64
            default: 10
        - name: keyword
          in: query
          required: false
          description: 标题关键词
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultNotificationSentPage'
        '401':
          $ref: '../_shared/components.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../_shared/components.yaml#/components/responses/Forbidden'

components:
  securitySchemes:
    BearerAuth:
      $ref: '../_shared/components.yaml#/components/securitySchemes/BearerAuth'

  schemas:
    SendNotificationRequest:
      type: object
      required: [title, content, targetType]
      properties:
        title:
          type: string
          description: 标题
          example: 系统公告
        content:
          type: string
          description: 正文
          example: 欢迎使用站内信
        targetType:
          type: integer
          description: 目标类型；1-用户 2-部门 3-职位 4-全体
          enum: [1, 2, 3, 4]
        userIds:
          type: array
          description: 定向用户 ID 列表（targetType=1 时必填）
          items:
            type: integer
            format: int64
        departmentIds:
          type: array
          description: 部门 ID 列表（targetType=2 时必填）
          items:
            type: integer
            format: int64
        positionIds:
          type: array
          description: 职位 ID 列表（targetType=3 时必填）
          items:
            type: integer
            format: int64

    NotificationSendResultVO:
      type: object
      properties:
        notificationId:
          type: integer
          format: int64
          description: 通知主键
        recipientCount:
          type: integer
          description: 实际投递用户数

    NotificationSentVO:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: 通知主键
        title:
          type: string
          description: 标题
        content:
          type: string
          description: 正文
        targetType:
          type: integer
          description: 目标类型；1-用户 2-部门 3-职位 4-全体
          enum: [1, 2, 3, 4]
        recipientCount:
          type: integer
          description: 投递人数
        senderUserId:
          type: integer
          format: int64
          description: 发送人用户 ID
        createTime:
          type: string
          format: date-time
          description: 发送时间

    PageNotificationSentVO:
      allOf:
        - $ref: '../_shared/components.yaml#/components/schemas/PageVO'
        - type: object
          properties:
            records:
              type: array
              items:
                $ref: '#/components/schemas/NotificationSentVO'

    ResultNotificationSendResultVO:
      allOf:
        - $ref: '../_shared/components.yaml#/components/schemas/ResultBase'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/NotificationSendResultVO'

    ResultNotificationSentPage:
      allOf:
        - $ref: '../_shared/components.yaml#/components/schemas/ResultBase'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/PageNotificationSentVO'
